<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Random walks on graphs preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="100%" stop-color="#dfeffc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f77b4"/>
      <stop offset="100%" stop-color="#2ca02c"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" rx="28" fill="url(#bg)"/>

  <g stroke="#7a8da6" stroke-width="3" opacity="0.7">
    <line x1="140" y1="130" x2="250" y2="90"/>
    <line x1="250" y1="90" x2="360" y2="130"/>
    <line x1="360" y1="130" x2="420" y2="230"/>
    <line x1="420" y1="230" x2="350" y2="320"/>
    <line x1="350" y1="320" x2="230" y2="350"/>
    <line x1="230" y1="350" x2="130" y2="280"/>
    <line x1="130" y1="280" x2="140" y2="130"/>
    <line x1="250" y1="90" x2="420" y2="230"/>
    <line x1="140" y1="130" x2="350" y2="320"/>
    <line x1="130" y1="280" x2="360" y2="130"/>
  </g>

  <g>
    <circle cx="140" cy="130" r="20" fill="#cce7ff" stroke="#1f77b4" stroke-width="4"/>
    <circle cx="250" cy="90" r="20" fill="#d6f3d6" stroke="#2ca02c" stroke-width="4"/>
    <circle cx="360" cy="130" r="20" fill="#ffe6c9" stroke="#ff7f0e" stroke-width="4"/>
    <circle cx="420" cy="230" r="20" fill="#f6d8f6" stroke="#9467bd" stroke-width="4"/>
    <circle cx="350" cy="320" r="20" fill="#ffd6d6" stroke="#d62728" stroke-width="4"/>
    <circle cx="230" cy="350" r="20" fill="#e3edff" stroke="#1f77b4" stroke-width="4"/>
    <circle cx="130" cy="280" r="20" fill="#d6f3d6" stroke="#2ca02c" stroke-width="4"/>
  </g>

  <path d="M140 130 C170 100, 210 90, 250 90 S330 115, 360 130 S400 180, 420 230 S390 300, 350 320"
        fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>

  <g transform="translate(490,85)">
    <rect x="0" y="0" width="250" height="320" rx="18" fill="#ffffff" stroke="#c7d5e4" stroke-width="3"/>
    <text x="20" y="42" font-family="Georgia, serif" font-size="30" fill="#1f2d3d">TV Distance</text>
    <polyline points="20,260 60,220 100,185 140,160 180,145 220,138"
              fill="none" stroke="#1f77b4" stroke-width="6"/>
    <line x1="20" y1="260" x2="230" y2="260" stroke="#6e8194" stroke-width="2"/>
    <line x1="20" y1="260" x2="20" y2="80" stroke="#6e8194" stroke-width="2"/>
    <line x1="20" y1="155" x2="230" y2="155" stroke="#d62728" stroke-dasharray="8 6" stroke-width="3"/>
    <text x="20" y="298" font-family="Georgia, serif" font-size="24" fill="#2f3e4e">Mixing + Spectrum</text>
  </g>
</svg>
