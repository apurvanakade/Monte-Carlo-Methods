<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gibbs Sampling</title>
  <desc id="desc">Zig-zag Gibbs trajectories and autocorrelation motif.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <rect x="60" y="70" width="520" height="490" rx="20" fill="url(#panel)" filter="url(#shadow)"/>
  <rect x="620" y="70" width="520" height="490" rx="20" fill="url(#panel)" filter="url(#shadow)"/>

  <text x="90" y="122" font-family="Georgia, serif" font-size="34" fill="#0f172a">Independent (rho = 0)</text>
  <text x="650" y="122" font-family="Georgia, serif" font-size="34" fill="#0f172a">Correlated (rho = 0.7)</text>

  <path d="M110 220 L170 220 L170 280 L235 280 L235 210 L300 210 L300 290 L360 290 L360 240 L430 240 L430 320 L500 320"
        fill="none" stroke="#9ca3af" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="170" cy="220" r="7" fill="#f97316"/>
  <circle cx="235" cy="280" r="7" fill="#f97316"/>
  <circle cx="300" cy="210" r="7" fill="#f97316"/>
  <circle cx="360" cy="290" r="7" fill="#f97316"/>
  <circle cx="430" cy="240" r="7" fill="#2563eb"/>
  <circle cx="500" cy="320" r="10" fill="#dc2626"/>

  <path d="M670 220 L760 220 L760 315 L850 315 L850 205 L930 205 L930 350 L1020 350"
        fill="none" stroke="#9ca3af" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="760" cy="220" r="7" fill="#f97316"/>
  <circle cx="850" cy="315" r="7" fill="#f97316"/>
  <circle cx="930" cy="205" r="7" fill="#2563eb"/>
  <circle cx="1020" cy="350" r="10" fill="#dc2626"/>

  <path d="M108 470 C145 430 185 510 220 470 C255 430 300 520 338 470 C375 425 425 505 500 460"
        fill="none" stroke="#2563eb" stroke-width="5"/>
  <path d="M668 470 C708 390 748 550 788 470 C826 395 886 560 935 470 C975 395 1018 520 1080 455"
        fill="none" stroke="#2563eb" stroke-width="5"/>

  <text x="600" y="600" text-anchor="middle" font-family="Georgia, serif" font-size="54" fill="#1e293b">Gibbs Sampling</text>
</svg>
